<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krio — Plataforma de gestão criativa</title>
  <meta name="description" content="Plataforma Krio: tracker de demandas, operação em tempo real e aprovações centralizadas para agências." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./tokens.css" />
  <link rel="stylesheet" href="./shell.css" />
  <link rel="stylesheet" href="./modals.css" />
  <link rel="stylesheet" href="./tracker.css" />
  <link rel="stylesheet" href="./operations.css" />
  <link rel="stylesheet" href="./approval.css" />
  <script>
    (function () {
      var theme = localStorage.getItem('krio-theme') || 'dark';
      document.documentElement.dataset.theme = theme;
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#appMain">Ir para o conteúdo</a>

  <!-- ── Loading State ── -->
  <div id="loadingState" class="loading-state">
    <div class="loading-card-wrap">
      <div class="loading-card">
        <div class="loading-logo-wrap">
          <div class="k-logo">
            <svg viewBox="0 0 22 22" aria-hidden="true">
              <path d="M4.5 3h3.5v16H4.5V3ZM8 11l8-8h3.5L11.5 11l8 8H16L8 11Z" fill="#fff"/>
            </svg>
          </div>
        </div>
        <h1>Krio</h1>
        <p>Carregando workspace...</p>
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- ── App Shell ── -->
  <div id="appShell" class="app-shell" hidden>

    <!-- ── Sidebar ── -->
    <aside class="app-sidebar" aria-label="Navegação principal">
      <div class="sidebar-head">
        <div class="brand-lockup">
          <div class="brand-monogram-wrap">
            <div class="brand-monogram">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M4 3h3v14H4V3ZM7 10l7-7h3L10 10l7 7h-3L7 10Z" fill="#fff"/>
              </svg>
            </div>
          </div>
          <div class="brand-info">
            <span class="brand-name">Krio</span>
            <span id="pageTitle" class="brand-tagline">Tracker</span>
          </div>
        </div>
        <div class="sidebar-controls">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema" title="Modo claro">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/>
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 14.2A7.8 7.8 0 0 1 9.8 4 8.4 8.4 0 1 0 20 14.2Z"/>
            </svg>
          </button>
          <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Recolher menu" aria-expanded="true">
            <svg class="sidebar-icon sidebar-icon-collapse" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="14" rx="3"></rect>
              <path d="M10 5v14"></path>
              <path d="m16 9-3 3 3 3"></path>
            </svg>
            <svg class="sidebar-icon sidebar-icon-expand" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="14" rx="3"></rect>
              <path d="M10 5v14"></path>
              <path d="m13 9 3 3-3 3"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Module nav actions inject here -->
      <div id="moduleActions" class="side-module-actions"></div>

      <div class="sidebar-footer">
        <!-- User block -->
        <div class="user-block">
          <div id="userAvatar" hidden class="avatar"></div>
          <div class="user-info">
            <span id="userName" hidden class="user-name"></span>
            <span id="userRole" hidden class="user-role"></span>
          </div>
        </div>
        <!-- Logout -->
        <button id="logoutBtn" class="logout-nav-btn" type="button" title="Sair da conta" aria-label="Sair">
          <span class="side-icon">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 14H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h3"/>
              <polyline points="10,5 14,8 10,11"/>
              <line x1="14" y1="8" x2="5" y2="8"/>
            </svg>
          </span>
          <span class="side-label">Sair</span>
        </button>
      </div>
    </aside>

    <!-- ── Main body ── -->
    <section class="app-body" id="appMain">
      <header class="app-topbar">
        <nav class="app-tab-nav" aria-label="Módulos da plataforma">
          <button class="app-tab active" type="button" data-view="tracker">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="2" width="5" height="5" rx="1"/>
              <rect x="9" y="2" width="5" height="5" rx="1"/>
              <rect x="2" y="9" width="5" height="5" rx="1"/>
              <rect x="9" y="9" width="5" height="5" rx="1"/>
            </svg>
            Tracker
          </button>
          <button class="app-tab" type="button" data-view="operations">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="8" cy="8" r="2.5"/>
              <path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1 1M11.6 11.6l1 1M12.6 3.4l-1 1M4.4 11.6l-1 1"/>
            </svg>
            Operação
          </button>
          <button class="app-tab" type="button" data-view="approval">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="2" width="12" height="12" rx="2.5"/>
              <polyline points="5,8.5 7.5,11 11,6"/>
            </svg>
            Aprovação
          </button>
        </nav>
        <div class="app-topbar-right">
          <div id="topbarActions" class="topbar-module-actions"></div>
          <div id="syncChip" class="sync-chip" title="Sincronizado com o servidor">
            <span></span>
          </div>
        </div>
      </header>

      <main class="main">
        <p id="pageSubtitle" class="page-subtitle"></p>
        <div class="content">
          <section id="view-tracker" class="module-view active" data-module-view="tracker" aria-label="Tracker">
            <div id="trackerModuleMount" class="module-mount"></div>
          </section>
          <section id="view-operations" class="module-view" data-module-view="operations" aria-label="Operação">
            <div id="operationsModuleMount" class="module-mount"></div>
          </section>
          <section id="view-approval" class="module-view" data-module-view="approval" aria-label="Aprovação">
            <div id="approvalModuleMount" class="module-mount"></div>
          </section>
        </div>
      </main>
    </section>
  </div>

  <script type="module" src="./scripts/app-shell.js"></script>
  <script>
    (function () {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      function syncLabel() {
        var isDark = document.documentElement.dataset.theme === 'dark';
        btn.setAttribute('aria-label', isDark ? 'Ativar modo claro' : 'Ativar modo escuro');
        btn.title = isDark ? 'Modo claro' : 'Modo escuro';
      }
      btn.addEventListener('click', function () {
        var root = document.documentElement;
        root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('krio-theme', root.dataset.theme);
        syncLabel();
      });
      syncLabel();
    })();
  </script>
</body>
</html>
